name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-20.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create-release
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.split('/').pop(),
              name: context.ref.split('/').pop(),
              draft: true,
              prerelease: false
            })
            return data.id

  release-assets:
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-20.04, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: Build tauri app
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: upload linux assets
        if: matrix.platform == 'ubuntu-20.04'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: https://api.github.com/repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }}/assets
          asset_path: ./src-tauri/target/release/bundle/deb/yuki_${{ github.event.inputs.version }}_amd64.deb
          asset_name: yuki_${{ github.event.inputs.version }}_amd64.deb
          asset_content_type: application/vnd.debian.binary-package

      - name: upload windows assets
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: https://api.github.com/repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }}/assets
          asset_path: ./src-tauri/target/release/bundle/msi/yuki_${{ github.event.inputs.version }}_x64.msi
          asset_name: yuki_${{ github.event.inputs.version }}_x64.msi
          asset_content_type: application/octet-stream